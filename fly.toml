# fly.toml — Fly.io deployment config for Flashleet
# Generated by `fly launch` and committed so future deploys work consistently.
# See README.md → Deploying for full setup instructions.

app = "flashleet"        # change this to your chosen app name
primary_region = "sin"   # change to your nearest region (fly platform regions)

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume — stores card states, settings, and session data.
# Create it first with: fly volumes create flashleet_data --size 1
[mounts]
  source = "flashleet_data"
  destination = "/app/data"
